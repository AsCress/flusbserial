name: "macOS Workflow"
description: "Builds the macOS desktop app using Flutter"

runs:
  using: "composite"
  steps:
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        cache: false
        flutter-version-file: pubspec.yaml

    - name: Update Podfile
      shell: bash
      run: |
        cd ./example/macos
        flutter pub get
        pod install --repo-update

    - name: Build macOS App
      shell: bash
      run: |
        cd ./example
        flutter config --enable-macos-desktop
        flutter build macos